<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Rent vs. Sell{% endblock %}</title>
<style>
  :root { --ink:#1a1a1a; --muted:#666; --line:#e2e2e2; --bg:#fafafa;
    --good:#0a7d3c; --bad:#c0392b; --warn:#b8860b; --accent:#2b5797; }
  * { box-sizing:border-box; }
  body { font:16px/1.6 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--bg); margin:0; }
  .wrap { max-width:920px; margin:0 auto; padding:32px 24px 80px; }
  h1 { font-size:28px; margin:0 0 4px; }
  h2 { font-size:21px; margin:40px 0 6px; padding-bottom:6px; border-bottom:2px solid var(--line); }
  h3 { font-size:16px; margin:22px 0 6px; color:var(--accent); }
  .sub { color:var(--muted); }
  p.sub { margin:0 0 8px; }
  .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:18px 20px; margin:14px 0; }
  table { width:100%; border-collapse:collapse; margin:10px 0; font-size:14px; }
  th, td { padding:7px 9px; text-align:right; border-bottom:1px solid var(--line); }
  th:first-child, td:first-child { text-align:left; }
  thead th { background:#f0f3f8; font-weight:600; }
  tr.total td { font-weight:700; border-top:2px solid #ccc; }
  /* Row highlights are NEUTRAL: they distinguish the base case and the sell rows for
     scanability, NOT good/bad. Green/tan would read as a verdict (green = good = hold);
     a neutral blue-gray and a plain gray stay value-free. See CLAUDE.md rule 2. */
  tr.primary { background:#eef1f6; }
  tr.sell td { background:#f4f4f5; }
  /* num-good/num-bad color the SIGN of a cash component (inflow vs. outflow) — a factual
     convention, not a judgment about which option wins. */
  .num-good { color:var(--good); font-weight:600; }
  .num-bad { color:var(--bad); font-weight:600; }
  /* Single neutral pill — no good/bad/warn valence (those would editorialize). */
  .pill { display:inline-block; padding:1px 9px; border-radius:20px; font-size:11.5px;
    font-weight:600; background:#eceef2; color:#555; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media(max-width:640px){ .grid{grid-template-columns:1fr;} }
  ul { margin:8px 0; padding-left:22px; } li { margin:6px 0; }
  .callout { border-left:4px solid var(--accent); background:#eef2f9; padding:12px 16px; border-radius:0 8px 8px 0; margin:14px 0; }
  .foot { color:var(--muted); font-size:13px; margin-top:40px; border-top:1px solid var(--line); padding-top:14px; }
  .legend { font-size:13px; color:var(--muted); margin:6px 0 0; }
  code { background:#f0f0f0; padding:1px 5px; border-radius:4px; font-size:13px; }
  .nav { background:#fff; border:1px solid var(--line); border-radius:8px; padding:10px 14px; margin:14px 0; font-size:14px; }
  /* Collapsible verify-layer detail (no JS). Collapsed by default; the summary is the
     one-line handle. Printing forces them open so the PDF shows everything. */
  details { border:1px solid var(--line); border-radius:8px; padding:8px 14px; margin:10px 0; background:#fff; }
  details + details { margin-top:8px; }
  summary { cursor:pointer; font-weight:600; color:var(--accent); }
  details[open] summary { margin-bottom:4px; }
  @media print { details { display:block; } details > *:not(summary) { display:revert; } }
  /* Interactive break-even explorer (the one JS feature). Sliders are neutral controls;
     the readout shows figures only — no good/bad coloring (CLAUDE.md rule 2). */
  /* Global sticky control bar — stays pinned while scrolling so it drives every live
     chart/table across sections. Hidden in print (the server-seeded charts/tables stand in). */
  .sliderbar { position:sticky; top:0; z-index:20; background:rgba(250,250,250,0.97);
    backdrop-filter:saturate(1.2) blur(2px); border-bottom:1px solid var(--line);
    margin:0 -24px 14px; padding:12px 24px; }
  .sliders { display:grid; grid-template-columns:repeat(4,1fr); gap:10px 18px; margin:0; }
  @media(max-width:640px){ .sliders{grid-template-columns:1fr 1fr;} }
  @media print { .sliderbar { display:none; } }
  .sliders label { display:flex; flex-direction:column; font-size:13px; font-weight:600; color:var(--ink); gap:4px; }
  .sliders input[type=range] { width:100%; accent-color:var(--accent); }
  .slider-val { font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; }
  .readout { background:#f0f3f8; border:1px solid var(--line); border-radius:8px; padding:10px 14px;
    margin:10px 0 0; font-size:14px; font-variant-numeric:tabular-nums; }
  /* Sliders are interactive-only: hide them in print, where the static SVG + tables stand in. */
  @media print { .sliders, .readout { display:none; } }
</style>
</head>
<body>
<div class="wrap">
{% block body %}{% endblock %}
</div>
</body>
</html>
